name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
    
      - name: Calculate Rankings
        run: node scripts/ranker.js
    
      - name: Assemble Site Data
        run: node scripts/assemble.js

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'web'
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Output Deployment URL
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY

  fitness:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
    
      - name: Calculate Rankings
        run: node scripts/ranker.js
    
      - name: Run Fitness Analysis
        run: |
          node scripts/fitness.js
          cat output/fitness_report.txt >> $GITHUB_STEP_SUMMARY

  distribution:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
    
      - name: Calculate Rankings
        run: node scripts/ranker.js
    
      - name: Run Distribution Analysis
        run: |
          node scripts/distribution.js
          cat output/distribution_report.txt >> $GITHUB_STEP_SUMMARY

